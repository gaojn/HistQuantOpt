strategy: index_enhance
index: zz1000              # 指数增强默认中证1000

backtest:
  start_date: "2020-01-01"
  end_date: "2026-05-31"
  rebalance_freq: 10        # 10 个交易日换仓一次
  initial_value: 100000000

universe:
  exclude_bj: true
  exclude_st: true
  top_n: null

optimizer:
  weight_upper: 0.01
  min_constituent_ratio: 0.80
  industry_active_bound: 0.07
  # 风格约束（CNE6 16 因子）：可写标量统一约束，或写 dict 按因子分别约束。
  # dict 形式：default 为未列出因子的兜底，其余按因子名覆盖。
  # CNE6 风格因子名：Size MidCap Beta Momentum ResidualVolatility LongTermReversal
  #   Liquidity Value EarningsYield Growth Profitability InvestmentQuality
  #   EarningsQuality EarningsVariability Leverage DividendYield
  style_active_bound:
    default: 0.50
    Size: 0.30          # 市值中性收紧
    Momentum: 0.20      # 动量收紧
  # cne6_data_dir: data/barra_cne6_L   # 可选：改用长周期面板（默认短周期 S）
  # risk_aversion: 10.0                # 可选：因子协方差进目标（真跟踪误差），不设则用 L2 惩罚
  tracking_penalty: 10.0
  max_turnover: 0.40       # 双边换手硬上限：sum(abs(w-w_prev)) <= 40%，约等于单边换手 <= 20%
  weight_diff_l2_bound: null

alpha:
  source: file
  path: "alphas/alpha_vwap5_ic0.12_icir1.2_decay0.80.parquet"

execution:
  cost_buy: 0.001
  cost_sell: 0.002
  risk_free: 0.02

output:
  weights: "output/index_enhance_demo/weights.parquet"
