strategy: index_enhance
index: hs300

backtest:
  start_date: "2023-06-01"
  end_date: "2026-05-22"
  rebalance_freq: 5
  initial_value: 100000000

universe:
  exclude_bj: true
  exclude_st: true
  top_n: null               # null = 全市场

optimizer:
  weight_upper: 0.05
  weight_lower: 0.0
  min_constituent_ratio: 0.80
  industry_active_bound: 0.07
  style_active_bound: 0.50
  tracking_penalty: 10.0
  max_turnover: 0.40
  weight_diff_l2_bound: null
  # 换手软惩罚：λ × Σ c_i |Δw_i|，0 表示关闭
  # 调参参考（alpha 为 z-score 时）：0.01~0.05
  turnover_penalty: 0.0
  # 是否按个股流动性加权（σ/√ADV），关闭则等权惩罚
  liquidity_weighted_cost: true

alpha:
  ic_mean: 0.08
  ic_std: 0.10
  decay: 0.80
  seed: 42
  fwd_days: 5

execution:
  cost_buy: 0.001
  cost_sell: 0.002
  risk_free: 0.02

output:
  weights: "output/hs300_enhance_weights.parquet"
  nav: "output/hs300_enhance_nav_realistic.parquet"
  report: "output/hs300_enhance_report_realistic.html"
  report_title: "沪深300 指数增强组合回测报告（真实执行）"
