strategy: index_enhance
index: zz500

# CNE6S vs CNE6L 横向对比基础配置：低频（月度）换仓策略，
# 风险面板覆盖已回算到 2023-01~2026-05（S/L 两版面板时间对齐）。
# 由 examples/validate_cne6_horizon_ab.py 派生 cne6_data_dir / risk_aversion。
backtest:
  start_date: "2023-02-01"
  end_date: "2026-05-20"
  rebalance_freq: 21          # 月度换仓 —— 与 CNE6L "月度以上" 设计定位匹配
  initial_value: 100000000

universe:
  exclude_bj: true
  exclude_st: true
  top_n: null

optimizer:
  weight_upper: 0.02
  weight_lower: 0.0
  min_constituent_ratio: 0.80
  industry_active_bound: 0.07
  style_active_bound: 0.50
  max_turnover: 0.50
  weight_diff_l2_bound: null
  # ── 由脚本覆盖 ──
  use_cne6_risk: true
  cne6_data_dir: null         # null → CNE6S(默认)；"data/barra_cne6_L" → CNE6L
  risk_aversion: 10.0
  tracking_penalty: 10.0

alpha:
  ic_mean: 0.05               # 中等强度（之前验证：信号越弱，CNE6 风险模型优势越明显）
  ic_std: 0.10
  decay: 0.90                 # 月度持有期，信号衰减放慢
  seed: 42
  fwd_days: 21                # 与月度换仓周期匹配

execution:
  cost_buy: 0.001
  cost_sell: 0.002
  risk_free: 0.02

output:
  weights: "output/_horizon_ab_weights.parquet"
  nav: "output/_horizon_ab_nav.parquet"
  report: "output/_horizon_ab_report.html"
  report_title: "CNE6S vs CNE6L 横向对比"
