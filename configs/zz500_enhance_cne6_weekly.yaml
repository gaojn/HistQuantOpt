strategy: index_enhance
index: zz500

# CNE6S vs CNE6L 横向对比 —— 周度换仓版本（CNE6S 的设计主场：5-10天换仓）。
# 与 zz500_enhance_cne6_horizon.yaml（月度版）共用同一对比框架，
# 仅改动与"换仓频率"机制绑定的三项：rebalance_freq / fwd_days / decay；
# 其余（样本期、alpha 强度、约束、λ 网格）保持一致，确保两组 A/B
# 实验之间的差异只来自"换仓频率"本身，便于横向拼接出完整的频率谱结论。
backtest:
  start_date: "2023-02-01"
  end_date: "2026-05-20"
  rebalance_freq: 5           # 周度换仓 —— 与 CNE6S "5-10天" 设计定位匹配
  initial_value: 100000000

universe:
  exclude_bj: true
  exclude_st: true
  top_n: null

optimizer:
  weight_upper: 0.02
  weight_lower: 0.0
  min_constituent_ratio: 0.80
  industry_active_bound: 0.07
  style_active_bound: 0.50
  max_turnover: 0.50
  weight_diff_l2_bound: null
  use_cne6_risk: true
  cne6_data_dir: null         # null → CNE6S(默认)；"data/barra_cne6_L" → CNE6L
  risk_aversion: 10.0
  tracking_penalty: 10.0

alpha:
  ic_mean: 0.05               # 与月度版一致：信号强度不是本对比的变量
  ic_std: 0.10
  decay: 0.80                 # 周度持有期 —— 信号衰减更快（月度版用 0.90）
  seed: 42
  fwd_days: 5                 # 与周度换仓周期匹配（月度版用 21）

execution:
  cost_buy: 0.001
  cost_sell: 0.002
  risk_free: 0.02

output:
  weights: "output/_horizon_ab_weekly_weights.parquet"
  nav: "output/_horizon_ab_weekly_nav.parquet"
  report: "output/_horizon_ab_weekly_report.html"
  report_title: "CNE6S vs CNE6L 横向对比（周度换仓）"
